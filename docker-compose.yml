services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8001:8000" # Changed host port to 8001 to avoid conflict
    volumes:
      - ./data:/app/data # Persist data
    environment:
      - STEAM_API_KEY=${STEAM_API_KEY:-}
      - STEAM_ID=${STEAM_ID:-}
      - SYNC_INTERVAL_HOURS=${SYNC_INTERVAL_HOURS:-24}
      - RAWG_API_KEY=${RAWG_API_KEY:-}
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_URL=/api
    ports:
      - "8095:80" # Host port 8095 (behind Nginx proxy)
    depends_on:
      - backend
    restart: always
